server {
  listen 80;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

# Proxy para el backend
  location /api/ {
    proxy_pass http://backend:9090/;
  }

   # Redirige también login y auth
  location /login {
    proxy_pass http://backend:9090/login;
  }
}
